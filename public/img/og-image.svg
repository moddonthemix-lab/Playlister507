<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="divider" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0)"/>
      <stop offset="30%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="70%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle green glow bottom-left -->
  <ellipse cx="160" cy="540" rx="280" ry="160" fill="rgba(29,185,84,0.07)"/>

  <!-- LEFT SIDE: Branding -->
  <!-- Logo wordmark -->
  <text x="80" y="118" font-family="Arial Black, Impact, sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.35)" letter-spacing="6">PLAYLIST ENGINE</text>

  <!-- Main title -->
  <text x="80" y="240" font-family="Arial Black, Impact, sans-serif" font-size="112" font-weight="900" fill="none" stroke="white" stroke-width="2" letter-spacing="-2">PLAYLIST</text>
  <text x="80" y="350" font-family="Arial Black, Impact, sans-serif" font-size="112" font-weight="900" fill="white" letter-spacing="-2">ENGINE</text>

  <!-- Tagline -->
  <text x="82" y="410" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.45)" letter-spacing="3">CURATED.  EVOLVED.  ALWAYS FRESH.</text>

  <!-- Divider line under tagline -->
  <rect x="80" y="428" width="48" height="2" fill="#1DB954"/>

  <!-- CTA -->
  <rect x="80" y="468" width="200" height="46" rx="23" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="180" y="496" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="white" letter-spacing="2" text-anchor="middle">EXPLORE PLAYLISTS →</text>

  <!-- URL bottom left -->
  <text x="82" y="592" font-family="monospace, Courier" font-size="12" fill="rgba(255,255,255,0.2)" letter-spacing="1">playlistengine.com</text>

  <!-- VERTICAL DIVIDER -->
  <rect x="620" y="0" width="1" height="630" fill="url(#divider)"/>

  <!-- RIGHT SIDE: Playlist list -->
  <text x="680" y="118" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="rgba(255,255,255,0.3)" letter-spacing="4">— IN ROTATION —</text>

  <!-- Playlist 1: Florida Wave -->
  <rect x="680" y="148" width="4" height="48" rx="2" fill="#FFD166"/>
  <text x="702" y="168" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="white" letter-spacing="1">FRESH FLORIDA WAVE</text>
  <text x="702" y="186" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)" letter-spacing="1">Florida Rap · 20 Tracks · Bi-Weekly</text>

  <!-- Playlist 2: Gaming -->
  <rect x="680" y="218" width="4" height="48" rx="2" fill="#8B5CF6"/>
  <text x="702" y="238" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="white" letter-spacing="1">UNSTOPPABLE GAMING</text>
  <text x="702" y="256" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)" letter-spacing="1">All Genres · High Energy · Evolved</text>

  <!-- Playlist 3: Underground -->
  <rect x="680" y="288" width="4" height="48" rx="2" fill="#F5A623"/>
  <text x="702" y="308" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="white" letter-spacing="1">THE SLEPT ON UNDERGROUND</text>
  <text x="702" y="326" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)" letter-spacing="1">Rising Artists · Traction Tracked</text>

  <!-- Playlist 4: Workout -->
  <rect x="680" y="358" width="4" height="48" rx="2" fill="#FF4D4D"/>
  <text x="702" y="378" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="white" letter-spacing="1">THE IRON HOUR</text>
  <text x="702" y="396" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)" letter-spacing="1">All Genres · High Intensity · No Mercy</text>

  <!-- Playlist 5: Study -->
  <rect x="680" y="428" width="4" height="48" rx="2" fill="#4FC3F7"/>
  <text x="702" y="448" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="white" letter-spacing="1">LOCKED IN</text>
  <text x="702" y="466" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)" letter-spacing="1">Focus · Instrumental · Zero Distractions</text>

  <!-- Playlist 6: Summer -->
  <rect x="680" y="498" width="4" height="48" rx="2" fill="#FFD166"/>
  <text x="702" y="518" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="white" letter-spacing="1">SEASONAL: SUMMER JAMS</text>
  <text x="702" y="536" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)" letter-spacing="1">All Vibes · Feel Good · Sun &amp; Waves</text>

  <!-- Bottom right tag -->
  <text x="1120" y="592" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.15)" letter-spacing="1" text-anchor="end">AUTO-CURATED · SPOTIFY · 2WK REFRESH</text>
</svg>
